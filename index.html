<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="author" content="Sumali Junuthula">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sumali Junuthula</title>
  <style>
    body {
      font-family: Ariel, sans-serif;
      padding: 2rem;
      background-color: #f5f5f5;
    }
    h1 {
      color: #333;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      background: white;
      margin: 0.5rem 0;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
    a {
      text-decoration: none;
      color: #0366d6;
      font-weight: bold;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>My GitHub Repositories</h1>
  <ul id="repo-list">
    <!-- Repositories will be inserted here -->
  </ul>

  <script>
    const username = "your-github-username"; // Replace this with your GitHub username
    const repoList = document.getElementById("repo-list");

    fetch(`https://api.github.com/users/${username}/repos`)
      .then(response => response.json())
      .then(repos => {
        repos.forEach(repo => {
          const li = document.createElement("li");
          li.innerHTML = `<a href="${repo.html_url}" target="_blank">${repo.name}</a><p>${repo.description || "No description provided."}</p>`;
          repoList.appendChild(li);
        });
      })
      .catch(error => {
        repoList.innerHTML = "<li>Error fetching repositories. Please check your username or try again later.</li>";
        console.error(error);
      });
  </script>
</body>
</html>
